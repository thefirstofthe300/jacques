# jacques configuration file
# Location: ~/.config/jacques/config.toml
# Copy this file to that location and uncomment the fields you want to change.

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------

# Path to the SQLite database file used by jacques.
# db_path = "jacques.db"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------

# Directory where finished encodes are written.
# output_path = "/media/library"

# Scratch space used during ripping and encoding. Must have enough room for
# a raw MKV (typically 20–50 GB per disc).
# temp_path = "/tmp/jacques"

# Full path (or command name on $PATH) for the makemkvcon binary.
# makemkvcon_path = "makemkvcon"

# ---------------------------------------------------------------------------
# HandBrake
# ---------------------------------------------------------------------------

# Full path (or command name on $PATH) for the HandBrakeCLI binary.
# handbrake_path = "HandBrakeCLI"

# x265 RF (Rate Factor) quality value.
# Lower values produce better quality but larger files.
# Typical range: 18 (high quality) – 28 (smaller file, more compression).
# handbrake_quality = 20

# x265 encoder speed preset.
# Options: ultrafast, veryfast, faster, fast, medium, slow, slower, veryslow
# Slower presets achieve better compression at the same quality level;
# faster presets finish more quickly but produce larger files.
# handbrake_preset = "medium"

# ---------------------------------------------------------------------------
# API
# ---------------------------------------------------------------------------

# The Movie Database (TMDB) API key used for metadata lookups.
# Obtain one at https://www.themoviedb.org/settings/api
# tmdb_api_key = ""

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------

# Address the HTTP server listens on.
# host = "0.0.0.0"

# Port the HTTP server listens on.
# port = 8080

# Minimum title duration in seconds. Titles shorter than this are ignored
# during ripping (filters out menus, trailers, and bonus clips).
# Default is 1200 (20 minutes).
# min_title_duration_seconds = 1200
