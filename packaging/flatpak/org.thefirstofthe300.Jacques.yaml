app-id: org.thefirstofthe300.Jacques
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.python312

command: jacques

# Jacques needs makemkvcon and HandBrakeCLI from the host. These are not
# available inside the sandbox, so the daemon calls them via flatpak-spawn
# --host. The user must have both binaries on their host PATH and must
# grant the Flatpak portal permission (--talk-name=org.freedesktop.Flatpak).
finish-args:
  - --share=network
  - --device=all
  - --filesystem=/dev/sr0:rw
  - --filesystem=/dev/cdrom:rw
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak

build-options:
  append-path: /usr/lib/sdk/python312/bin
  env:
    PYTHON: python3.12
    PIP_DISABLE_PIP_VERSION_CHECK: '1'

modules:
  # ── Python dependencies ──────────────────────────────────────────────────────
  # python-modules.json is generated by:  bash packaging/flatpak/generate-sources.sh
  # Commit it alongside this manifest before building.
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --no-index --find-links=. --prefix=/app
          fastapi uvicorn jinja2 python_multipart sqlalchemy aiosqlite
          pydantic_settings pyudev httpx rich
    sources:
      - python-modules.json

  # ── Jacques ──────────────────────────────────────────────────────────────────
  - name: jacques
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app .
    sources:
      - type: dir
        path: ../..

  # ── Host-binary bridge ───────────────────────────────────────────────────────
  # Thin wrappers that forward makemkvcon / HandBrakeCLI calls to the host via
  # flatpak-spawn so the sandboxed daemon can use host-installed binaries.
  - name: host-bridge
    buildsystem: simple
    build-commands:
      - install -Dm755 makemkvcon-bridge.sh /app/bin/makemkvcon
      - install -Dm755 HandBrakeCLI-bridge.sh /app/bin/HandBrakeCLI
    sources:
      - type: script
        dest-filename: makemkvcon-bridge.sh
        commands:
          - exec flatpak-spawn --host makemkvcon "$@"
      - type: script
        dest-filename: HandBrakeCLI-bridge.sh
        commands:
          - exec flatpak-spawn --host HandBrakeCLI "$@"
