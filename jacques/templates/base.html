<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jacques</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    body {
      background-color: #0d1117;
      min-height: 100vh;
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.5px;
    }
    .job-card {
      background-color: #161b22;
      border-color: #30363d !important;
      transition: border-color 0.15s ease;
    }
    .job-card:hover {
      border-color: #58a6ff !important;
    }
    .progress {
      background-color: #21262d;
    }
    .badge.status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .text-muted {
      color: #8b949e !important;
    }
    .drive-path {
      font-family: monospace;
      font-size: 0.8rem;
    }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark" style="background-color: #161b22; border-bottom: 1px solid #30363d;">
    <div class="container-fluid px-4">
      <span class="navbar-brand">
        <i class="bi bi-disc-fill me-2" style="color: #58a6ff;"></i>Jacques
      </span>
      <span class="text-muted small">Disc Ripping Daemon</span>
    </div>
  </nav>

  <div class="container-fluid px-4 py-4" style="max-width: 960px;">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  function submitTmdbId(jobId) {
    const input = document.getElementById('tmdb-id-' + jobId);
    const tmdbId = parseInt(input.value, 10);
    if (!tmdbId || tmdbId < 1) {
      alert('Please enter a valid TMDB ID');
      return;
    }
    const typeSelect = document.getElementById('tmdb-type-' + jobId);
    const discType = typeSelect ? '?disc_type=' + typeSelect.value : '';
    htmx.ajax('POST', '/api/jobs/' + jobId + '/select/' + tmdbId + discType, {swap: 'none'});
  }

  function submitEpisodeAssignments(jobId, titleIds) {
    var assignments = titleIds.map(function (titleId) {
      var season = parseInt(document.getElementById('ep-season-' + jobId + '-' + titleId).value, 10);
      var episode = parseInt(document.getElementById('ep-episode-' + jobId + '-' + titleId).value, 10);
      var name = document.getElementById('ep-name-' + jobId + '-' + titleId).value;
      return {title_id: titleId, season: season, episode: episode, name: name};
    });
    if (assignments.some(function (a) { return !a.season || !a.episode; })) {
      alert('Please enter a valid season and episode number for every title');
      return;
    }
    fetch('/api/jobs/' + jobId + '/assign-episodes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(assignments),
    });
  }

  // Preserve input values and dynamically-loaded candidate lists across
  // job-list innerHTML swaps. HTMX fires beforeSwap and afterSwap synchronously
  // in the same JS task, so the browser never renders the intermediate state.
  (function () {
    var saved = null;
    document.addEventListener('htmx:beforeSwap', function (e) {
      if (!e.detail.target || e.detail.target.id !== 'job-list') return;
      saved = { values: {}, candidates: {} };
      e.detail.target.querySelectorAll('input[id], select[id]').forEach(function (el) {
        if (el.value !== '') saved.values[el.id] = el.value;
      });
      e.detail.target.querySelectorAll('[id^="candidates-"]').forEach(function (el) {
        if (el.innerHTML.trim() !== '') saved.candidates[el.id] = el.innerHTML;
      });
    });
    document.addEventListener('htmx:afterSwap', function (e) {
      if (!e.detail.target || e.detail.target.id !== 'job-list' || !saved) return;
      Object.keys(saved.values).forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.value = saved.values[id];
      });
      Object.keys(saved.candidates).forEach(function (id) {
        var el = document.getElementById(id);
        if (el) { el.innerHTML = saved.candidates[id]; htmx.process(el); }
      });
      saved = null;
    });
  })();
  </script>
</body>
</html>
