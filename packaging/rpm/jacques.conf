# Jacques configuration
# Copy to /etc/jacques/jacques.conf and adjust as needed.
# All variables are optional — the defaults work for most setups.

# Directory where ripped and organized media is stored.
# JACQUES_OUTPUT_PATH=/var/lib/jacques/library

# Temporary working directory for in-progress ripping and transcoding.
# JACQUES_TEMP_PATH=/var/lib/jacques/tmp

# Web UI port. No authentication — bind behind a reverse proxy for remote access.
# JACQUES_PORT=8080

# HandBrake RF quality factor. Lower = better quality. Range 0-51; 18-22 recommended.
# JACQUES_HANDBRAKE_QUALITY=20

# TMDb API key for metadata lookup. Obtain a free key at https://www.themoviedb.org/settings/api
# Without this key the disc label is used as the filename.
# JACQUES_TMDB_API_KEY=
